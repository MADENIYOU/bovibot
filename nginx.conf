server {
    listen 80;
    root /usr/share/nginx/html;
    index html/index.html;

    location / {
        try_files $uri $uri/ /html/index.html;
    }

    location /api/ {
        proxy_pass http://backend:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend:8002;
    }
}